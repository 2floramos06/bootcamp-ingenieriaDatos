x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3-python3.11
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    _PIP_ADDITIONAL_REQUIREMENTS: "psycopg2-binary pandas"
    # Variables propias para que los DAGs se conecten al DWH (bronze/silver/gold)
    DWH_HOST: postgres
    DWH_PORT: 5432
    DWH_DB: dwh
    DWH_USER: ${POSTGRES_USER}
    DWH_PASSWORD: ${POSTGRES_PASSWORD}
  volumes:
    - ../dags:/opt/airflow/dags
    - ../sql:/opt/airflow/sql
    - ../src:/opt/airflow/src
    - ../data:/opt/airflow/data
    - airflow_logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16
    container_name: bootcamp_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: airflow
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      retries: 10

  airflow-init:
    <<: *airflow-common
    container_name: bootcamp_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username ${AIRFLOW_ADMIN_USER} \
          --password ${AIRFLOW_ADMIN_PASSWORD} \
          --firstname admin --lastname admin \
          --role Admin --email admin@example.com

  airflow-webserver:
    <<: *airflow-common
    container_name: bootcamp_airflow_web
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      - airflow-init

  airflow-scheduler:
    <<: *airflow-common
    container_name: bootcamp_airflow_scheduler
    command: scheduler
    depends_on:
      - airflow-init

  jupyter:
    image: jupyter/pyspark-notebook:latest
    container_name: bootcamp_jupyter
    environment:
      JUPYTER_TOKEN: ${JUPYTER_TOKEN}
    ports:
      - "8888:8888"
    volumes:
      - ../notebooks:/home/jovyan/work/notebooks
      - ../data:/home/jovyan/work/data
    command: start-notebook.sh --NotebookApp.token=${JUPYTER_TOKEN}

volumes:
  pg_data:
  airflow_logs: