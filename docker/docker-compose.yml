x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3-python3.11
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"

    #Reduccion de recursos
    AIRFLOW__CORE__PARALLELISM: "1"
    AIRFLOW__CORE__MAX_ACTIVE_TASKS_PER_DAG: "1"
    AIRFLOW__SCHEDULER__PARSING_PROCESSES: "1"
    AIRFLOW__WEBSERVER__WORKERS: "1"
    
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"

    _PIP_ADDITIONAL_REQUIREMENTS: "psycopg2-binary pandas docker==7.1.0"

    # Variables propias para que los DAGs se conecten al DWH (bronze/silver/gold)
    DWH_HOST: postgres
    DWH_PORT: 5432
    DWH_DB: dwh
    DWH_USER: ${POSTGRES_USER}
    DWH_PASSWORD: ${POSTGRES_PASSWORD}
  group_add:
    - "${DOCKER_GID}"
  volumes:
    - ../dags:/opt/airflow/dags
    - ../sql:/opt/airflow/sql
    - ../src:/opt/airflow/src
    - ../data:/opt/airflow/data
    - airflow_logs:/opt/airflow/logs
    - /var/run/docker.sock:/var/run/docker.sock
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16
    container_name: bootcamp_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: airflow
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      retries: 10

  airflow-init:
    <<: *airflow-common
    container_name: bootcamp_airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username ${AIRFLOW_ADMIN_USER} \
          --password ${AIRFLOW_ADMIN_PASSWORD} \
          --firstname admin --lastname admin \
          --role Admin --email admin@example.com \
          || true

  airflow-webserver:
    <<: *airflow-common
    container_name: bootcamp_airflow_web
    command: webserver
    ports:
      - "8081:8080"
    depends_on:
      - airflow-init

  metabase:
    image: metabase/metabase:v0.63.1.2
    container_name: bootcamp_metabase
    restart: unless-stopped

    ports:
      - "3000:3000"
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
      JAVA_TIMEZONE: America/La_Paz
    volumes:
      - metabase_data:/metabase-data
    depends_on:
      postgres:
        condition: service_healthy


  airflow-scheduler:
    <<: *airflow-common
    container_name: bootcamp_airflow_scheduler
    command: scheduler
    depends_on:
      - airflow-init

  jupyter:
    image: quay.io/jupyter/pyspark-notebook:latest
    container_name: bootcamp_jupyter

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      JUPYTER_TOKEN: ${JUPYTER_TOKEN}
      DWH_HOST: postgres
      DWH_PORT: 5432
      DWH_DB: dwh
      DWH_USER: ${POSTGRES_USER}
      DWH_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "8888:8888"
      - "4040:4040"

    volumes:
      - ../notebooks:/home/jovyan/work/notebooks
      - ../data:/home/jovyan/work/data
      - ../src:/home/jovyan/work/src

    command: 
      - start-notebook.py 
      - --IdentityProvider.token=${JUPYTER_TOKEN}

volumes:
  pg_data:
  airflow_logs:
  metabase_data: